name: Build Sakina APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3 cython3 ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
        pip install --upgrade pip buildozer cython
    - name: APK
      run: |
        buildozer init
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        yes y | buildozer -v android debug
    - uses: actions/upload-artifact@v4
      with:
        name: Sakina-APK
        path: bin/*.apk

